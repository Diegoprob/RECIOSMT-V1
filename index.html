<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakion MT Sorteador V4</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>⚔️ Rakion MT Sorteador</h1>
</header>

<div class="container">

<!-- ================= MAPAS ================= -->
<div class="card">
<h2>🗺️ Sorteo de Mapas</h2>

<label><input type="checkbox" class="mapa" value="AnotherTomb"> AnotherTomb</label><br>
<label><input type="checkbox" class="mapa" value="Lost Temple"> Lost Temple</label><br>
<label><input type="checkbox" class="mapa" value="Templo Serpiente"> Templo Serpiente</label><br>
<label><input type="checkbox" class="mapa" value="Tumba del Rey"> Tumba del Rey</label><br>

<br>
<button id="btnSortearMapa">🎲 Sortear Mapas</button>

<div id="resultadoMapas" style="margin-top:10px;"></div>
</div>

<!-- ================= JUGADORES ================= -->
<div class="card">
<h2>👥 Jugadores</h2>

<div class="agregar-jugador">
<input id="nuevoJugador" type="text" placeholder="Nombre del jugador">
<button id="btnAgregar">Agregar</button>
</div>

<div id="listaJugadores"></div>
</div>

<!-- ================= RULETA ================= -->
<div class="card">
<h2>🎡 Ruleta de Sorteo</h2>

<div class="ruleta-container">
<div id="ruleta">Listo</div>
</div>

<button id="btnSortear">Iniciar Sorteo</button>
</div>

<!-- ================= EQUIPOS ================= -->
<div class="card equipos">

<!-- 🟥 ROJO (1ERO) -->
<div class="equipo">
<h3>🟥 ROJO (1ERO)</h3>
<ul id="equipoA"></ul>
</div>

<!-- 🟦 AZUL (2DO) -->
<div class="equipo">
<h3>🟦 AZUL (2DO)</h3>
<ul id="equipoB"></ul>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
