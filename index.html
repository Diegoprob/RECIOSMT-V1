<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rakion MT Sorteador</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚔️ Rakion MT Sorteador</h1>
  <p>Sorteo de mapas y equipos por bombos</p>
</header>

<main class="container">

  <!-- ================= MAPAS ================= -->
  <section class="card">
    <h2>🗺️ Sorteo de Mapas</h2>

    <div class="mapas-grid">
      <label><input type="checkbox" class="mapa" value="AnotherTomb"> AnotherTomb</label>
      <label><input type="checkbox" class="mapa" value="Lost Temple"> Lost Temple</label>
      <label><input type="checkbox" class="mapa" value="Templo Serpiente"> Templo Serpiente</label>
      <label><input type="checkbox" class="mapa" value="Tumba del Rey"> Tumba del Rey</label>
    </div>

    <button id="btnSortearMapa">🎲 Sortear Mapas</button>

    <div id="resultadoMapas" class="resultado"></div>
  </section>

  <!-- ================= JUGADORES ================= -->
  <section class="card">
    <h2>👥 Jugadores</h2>

    <div class="agregar-jugador">
      <input id="nuevoJugador" type="text" placeholder="Nombre del jugador">
      <button id="btnAgregar">➕ Agregar</button>
    </div>

    <div class="acciones">
      <button id="btnSeleccionarTodos" class="btn-secundario">✅ Seleccionar todos</button>
      <button id="btnLimpiarSeleccion" class="btn-secundario">⬜ Limpiar selección</button>
      <button id="btnBorrarJugadores" class="btn-peligro">🗑️ Borrar jugadores</button>
    </div>

    <p class="ayuda">
      Marca a los jugadores que participarán y coloca exactamente 2 jugadores por cada bombo.
    </p>

    <div id="listaJugadores"></div>
  </section>

  <!-- ================= RULETA ================= -->
  <section class="card">
    <h2>🎡 Ruleta de Sorteo</h2>

    <div class="ruleta-container">
      <div id="ruleta">Listo</div>
    </div>

    <button id="btnSortear" class="btn-principal">🚀 Iniciar Sorteo</button>
    <button id="btnLimpiarEquipos" class="btn-secundario">🧹 Limpiar equipos</button>
  </section>

  <!-- ================= EQUIPOS ================= -->
  <section class="card equipos">
    <div class="equipo rojo">
      <h3>🟥 ROJO (1ERO)</h3>
      <ul id="equipoA"></ul>
    </div>

    <div class="equipo azul">
      <h3>🟦 AZUL (2DO)</h3>
      <ul id="equipoB"></ul>
    </div>
  </section>

  <!-- ================= HISTORIAL ================= -->
  <section class="card">
    <h2>📜 Historial</h2>
    <div class="acciones">
      <button id="btnBorrarHistorial" class="btn-peligro">🗑️ Borrar historial</button>
    </div>
    <div id="historial"></div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
